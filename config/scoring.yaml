# Credibility scoring weights — all values are configurable here.
# Final score formula:
#   raw = (w_contradicted * contradicted_ratio
#          + w_insufficient * insufficient_ratio
#          - w_supported * supported_ratio
#          + w_consistency * consistency_penalty_norm
#          - w_citation * citation_coverage_ratio
#          + w_uncertainty * parser_uncertainty
#          + w_unverified * high_impact_unverified_norm)
#   final_score = clamp(raw * 100, 0, 100)

weights:
  contradicted_ratio: 0.35      # high: contradicted claims strongly signal risk
  insufficient_evidence_ratio: 0.20   # medium: unverifiable is a softer signal
  supported_ratio: 0.15         # lowers risk
  consistency_penalty: 0.15     # consistency score deficit raises risk
  citation_coverage: 0.10       # good citation coverage lowers risk
  parser_uncertainty: 0.03      # small penalty for low-confidence extraction
  high_impact_unverified: 0.02  # small penalty per unverified high-importance claim

risk_bands:
  low_max: 30        # score <= 30 → low
  medium_max: 60     # 30 < score <= 60 → medium
  # above 60 → high

# Hard penalty thresholds applied additively on top of the weighted score.
hard_penalties:
  citation_score_floor: 55    # if citation score < this, add penalty
  citation_floor_penalty: 15
  consistency_score_floor: 65
  consistency_floor_penalty: 12
  grammar_low_penalty: 8
  no_evidence_penalty: 5      # if zero evidence results were retrieved
